<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jarvis Weather Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-gauges/gauge.min.js"></script>

<style>
:root {
    --bg: #f5f5f5;
    --panel: #ffffff;
    --text: #222;
    --muted: #666;
    --line: #ddd;
}
body {
    font-family: Arial;
    margin: 12px;
    background: var(--bg);
    color: var(--text);
    min-height: calc(100vh - 24px);
    overflow: hidden;
}
.page-shell {
    width: min(100%, 420px);
    margin-left: auto;
    margin-right: auto;
    transform-origin: top center;
}
h2 {
    margin: 0 0 4px;
    text-align: center;
}
.subtitle {
    margin: 0 0 10px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
}
.top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin: 0 0 8px;
}
.top-nav-left {
    display: flex;
    align-items: center;
    gap: 6px;
}
.top-nav-left label {
    color: var(--muted);
    font-size: 13px;
}
.top-nav a {
    text-decoration: none;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
}
.top-nav a:hover {
    background: #f0f0f0;
}
select {
    font-size: 13px;
    padding: 6px 8px;
}
table, .gauge-wrap {
    width: 100%;
    max-width: 100%;
    margin-left: auto;
    margin-right: auto;
}
table { border-collapse: collapse; background: var(--panel); }
td { padding: 6px 10px; border-bottom: 1px solid var(--line); }
.gauge-wrap canvas { display: block; width: 100%; height: auto; }
</style>
</head>

<body>
<div class="page-shell" id="pageShell">
<div class="top-nav">
    <div class="top-nav-left">
        <label for="locationSelect">Location:</label>
        <select id="locationSelect">
            <option value="jarvis">Jarvis</option>
            <option value="rgyc">RGYC Beacon</option>
        </select>
    </div>
    <a href="stats.html">Wind Graph and Stats</a>
</div>
<h2 id="pageTitle">Jarvis Weather</h2>
<p class="subtitle" id="status">Loading cloud data...</p>
<table>
<tr><td>Sensor ID</td><td id="sid">--</td></tr>
<tr><td>Battery OK</td><td id="bat">--</td></tr>
<tr><td>Temperature</td><td id="temp">--</td></tr>
<tr><td>Humidity</td><td id="hum">--</td></tr>
<tr><td>Wind Gust</td><td id="gust">--</td></tr>
<tr><td>Wind Avg</td><td id="avg">--</td></tr>
<tr><td>Wind Direction</td><td id="dir">--</td></tr>
<tr><td id="rainLabel">Rainfall (Last 24h)</td><td id="rain">--</td></tr>
</table>
<br>
<div class="gauge-wrap">
<canvas id="windGauge"
    data-type="radial-gauge"
    data-title="Wind Speed"
    data-min-value="0"
    data-max-value="60"
    data-major-ticks="0,10,20,30,40,50,60"
    data-minor-ticks="2"   
    data-start-angle="45"
    data-ticks-angle="270"
    data-stroke-ticks="true"
    data-units="kn"
    data-font-numbers-size="28"
    data-font-units-size="24"
    data-font-title-size="24"
    data-value-box="true"
    data-highlights='[
      { "from": 0,  "to": 20, "color": "rgba(40,167,69,.35)" },
      { "from": 20, "to": 35, "color": "rgba(255,193,7,.35)" },
      { "from": 35, "to": 60, "color": "rgba(220,53,69,.45)" }
    ]'
></canvas>
</div>
</div>

<script>
const API_BASE = "https://weather-api.dustin-popp82.workers.dev";
const API_DEVICE_ID = "";
const RAIN_REFRESH_MS = 60000;
const LOCATION_KEY = "weatherLocation";

const LOCATION_CONFIG = {
    jarvis: {
        label: "Jarvis",
        title: "Jarvis Weather",
        latestPath: "/api/latest",
        historyPath: "/api/history",
        supportsRain: true
    },
    rgyc: {
        label: "RGYC Beacon",
        title: "RGYC Weather",
        latestPath: "/api/rgyc/latest",
        historyPath: "/api/rgyc/history",
        supportsRain: false
    }
};

let cachedRain24h = null;
let lastRainFetchMs = 0;

const windGauge = () => (document.gauges && document.gauges.get("windGauge")) || null;

function toNumber(v) {
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
}

function toBatteryText(row) {
    if (row.bat !== undefined && row.bat !== null && row.bat !== "") {
        return String(row.bat);
    }
    if (row.battery_ok !== undefined && row.battery_ok !== null) {
        if (typeof row.battery_ok === "boolean") {
            return row.battery_ok ? "Yes" : "No";
        }
        const s = String(row.battery_ok).toLowerCase();
        if (s === "1" || s === "true" || s === "yes") {
            return "Yes";
        }
        if (s === "0" || s === "false" || s === "no") {
            return "No";
        }
        return String(row.battery_ok);
    }
    const batteryV = toNumber(row.battery_v);
    if (batteryV !== null) {
        return `${batteryV.toFixed(2)}V`;
    }
    return "--";
}

function setText(id, value) {
    const el = document.getElementById(id);
    if (el) {
        el.innerText = value;
    }
}

function getSelectedLocation() {
    const selected = localStorage.getItem(LOCATION_KEY) || "jarvis";
    return LOCATION_CONFIG[selected] ? selected : "jarvis";
}

function getLocationConfig() {
    return LOCATION_CONFIG[getSelectedLocation()];
}

function getLatestUrl() {
    const cfg = getLocationConfig();
    return `${API_BASE}${cfg.latestPath}`;
}

function getHistoryUrl(hours) {
    const cfg = getLocationConfig();
    return `${API_BASE}${cfg.historyPath}?hours=${hours}&t=${Date.now()}`;
}

function applyLocationUi() {
    const cfg = getLocationConfig();
    const pageTitle = document.getElementById("pageTitle");
    const rainLabel = document.getElementById("rainLabel");
    const locationSelect = document.getElementById("locationSelect");
    if (pageTitle) {
        pageTitle.innerText = cfg.title;
    }
    if (rainLabel) {
        rainLabel.innerText = cfg.supportsRain ? "Rainfall (Last 24h)" : "Rainfall (Last 24h)";
    }
    if (locationSelect) {
        locationSelect.value = getSelectedLocation();
    }
}

function resizeGauge() {
    const table = document.querySelector("table");
    const wrap = document.querySelector(".gauge-wrap");
    const canvas = document.getElementById("windGauge");
    if (!table || !wrap || !canvas) {
        return;
    }

    const sideMargin = 8;
    const ratio = 0.85;

    const tableWidth = Math.round(table.getBoundingClientRect().width);
    if (tableWidth <= 0) {
        return;
    }

    const width = Math.max(120, tableWidth - sideMargin * 2);
    const height = Math.round(width * ratio);

    wrap.style.maxWidth = `${width + sideMargin * 2}px`;
    canvas.style.width = `${width}px`;
    canvas.style.height = `${height}px`;

    const gauge = windGauge();
    if (gauge) {
        gauge.update({ width, height });
    }
}

function layoutPage() {
    const shell = document.getElementById("pageShell");
    if (!shell) {
        return;
    }

    shell.style.transform = "scale(1)";
    resizeGauge();

    requestAnimationFrame(() => {
        const shellRect = shell.getBoundingClientRect();
        const bodyStyle = getComputedStyle(document.body);
        const horizontalMargins =
            parseFloat(bodyStyle.marginLeft) + parseFloat(bodyStyle.marginRight);
        const verticalMargins =
            parseFloat(bodyStyle.marginTop) + parseFloat(bodyStyle.marginBottom);

        const availableWidth = Math.max(100, window.innerWidth - horizontalMargins);
        const availableHeight = Math.max(100, window.innerHeight - verticalMargins);

        const scaleX = availableWidth / shellRect.width;
        const scaleY = availableHeight / shellRect.height;
        const scale = Math.max(0.5, Math.min(scaleX, scaleY, 1));

        shell.style.transform = `scale(${scale})`;
    });
}

function normalizeRow(payload) {
    if (!payload) {
        return null;
    }

    if (payload.row && typeof payload.row === "object") {
        return payload.row;
    }

    if (payload.data && typeof payload.data === "object") {
        return payload.data;
    }

    return payload;
}

function rowTs(row) {
    const ts = Number(row?.ts ?? row?.created_at ?? row?.timestamp);
    return Number.isFinite(ts) ? ts : null;
}

function rowRainValue(row) {
    const n = toNumber(row?.rain ?? row?.rain_mm);
    return n === null ? null : n;
}

function calculateRainfallFromSeries(rows) {
    if (!Array.isArray(rows) || rows.length === 0) {
        return null;
    }

    const points = rows
        .map((row) => ({ ts: rowTs(row), rain: rowRainValue(row) }))
        .filter((p) => p.ts !== null && p.rain !== null)
        .sort((a, b) => a.ts - b.ts);

    if (points.length < 2) {
        return points.length === 1 ? 0 : null;
    }

    // Treat rain as cumulative when possible and sum only positive deltas.
    let total = 0;
    for (let i = 1; i < points.length; i += 1) {
        const delta = points[i].rain - points[i - 1].rain;
        if (delta > 0) {
            total += delta;
        }
    }
    return total;
}

async function refreshRain24h(force = false) {
    const cfg = getLocationConfig();
    if (!cfg.supportsRain) {
        return null;
    }

    const now = Date.now();
    if (!force && now - lastRainFetchMs < RAIN_REFRESH_MS) {
        return cachedRain24h;
    }

    const r = await fetch(getHistoryUrl(24), { cache: "no-store" });
    if (!r.ok) {
        throw new Error(`Rain history HTTP ${r.status}`);
    }

    const payload = await r.json();
    const rows = Array.isArray(payload) ? payload : [];
    cachedRain24h = calculateRainfallFromSeries(rows);
    lastRainFetchMs = now;
    return cachedRain24h;
}

async function updateFromCloud() {
    const status = document.getElementById("status");
    const cfg = getLocationConfig();

    try {
        // Force a fresh read each poll to avoid stale edge/browser cache.
        const r = await fetch(`${getLatestUrl()}?t=${Date.now()}`, { cache: "no-store" });
        if (!r.ok) {
            throw new Error(`HTTP ${r.status}`);
        }

        const payload = await r.json();
        const d = normalizeRow(payload);
        if (!d || typeof d !== "object") {
            throw new Error("No data row returned");
        }

        const ts = d.ts || d.created_at || d.timestamp || "now";
        const sourceId = d.device_id || d.sid || "unknown";
        setText("status", `Location: ${cfg.label} | Updated: ${ts} | Source: ${sourceId}`);

        // Match Worker output field names first, then legacy aliases.
        const sid = d.sid ?? d.device_id;
        const tempC = toNumber(d.temp);
        const humidity = toNumber(d.hum);
        const windAvgKn = toNumber(d.avg);
        const windGustKn = toNumber(d.gust);
        const windDir = d.dir;
        let rainMm24 = cachedRain24h;

        try {
            rainMm24 = await refreshRain24h(false);
        } catch (historyErr) {
            console.warn("Rain history update failed:", historyErr);
        }

        setText("sid", sid ?? "--");
        setText("bat", toBatteryText(d));
        setText("temp", tempC === null ? "--" : `${tempC.toFixed(1)}°C`);
        setText("hum", humidity === null ? "--" : `${humidity}%`);
        setText("gust", windGustKn === null ? "--" : `${windGustKn.toFixed(1)}kn`);
        setText("avg", windAvgKn === null ? "--" : `${windAvgKn.toFixed(1)}kn`);
        setText("dir", windDir ?? "--");
        setText("rain", rainMm24 === null ? "N/A" : `${rainMm24.toFixed(1)}mm`);

        const gauge = windGauge();
        if (gauge) {
            gauge.value = windAvgKn === null ? 0 : windAvgKn;
        }
    } catch (err) {
        if (status) {
            status.innerText = `Cloud fetch error: ${err.message}`;
        }
        console.error("Data update failed:", err);
    }
}

window.addEventListener("load", () => {
    applyLocationUi();

    layoutPage();
    setTimeout(layoutPage, 120);
    setTimeout(layoutPage, 400);
    refreshRain24h(true).catch((err) => console.warn("Initial rain history load failed:", err));
    updateFromCloud();
    setInterval(updateFromCloud, 2000);

    const locationSelect = document.getElementById("locationSelect");
    if (locationSelect) {
        locationSelect.addEventListener("change", () => {
            localStorage.setItem(LOCATION_KEY, locationSelect.value);
            cachedRain24h = null;
            lastRainFetchMs = 0;
            applyLocationUi();
            refreshRain24h(true).catch((err) => console.warn("Rain history load failed:", err));
            updateFromCloud();
        });
    }
});
window.addEventListener("resize", layoutPage);
window.addEventListener("orientationchange", layoutPage);

if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", layoutPage);
}
</script>

</body>
</html>
